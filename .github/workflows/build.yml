name: Build AxionOS Android 16 for Samsung A04

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من تبويب Actions

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bisect build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32ncurses5-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc zip zlib1g-dev python3 python3-pip

      - name: Configure Git & Install Repo Tool
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize AxionOS Source
        run: |
          mkdir -p android
          cd android
          # تهيئة سورس AxionOS الرسمي (Android 16)
          repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1

      - name: Clone Device Tree
        run: |
          cd android
          # استنساخ شجرة جهاز Samsung A04
          git clone https://github.com/juanes10201/android_device_samsung_a04.git -b lineage-20 device/samsung/a04

      - name: Sync Repositories
        run: |
          cd android
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Build ROM
        run: |
          cd android
          source build/envsetup.sh
          # اختيار تكوين البناء لجهاز A04
          lunch axion_a04-userdebug || lunch lineage_a04-userdebug
          # بدء عملية التجميع
          mka bacon -j$(nproc --all)

      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxionOS-Samsung-A04-Android16
          path: android/out/target/product/a04/*.zip
