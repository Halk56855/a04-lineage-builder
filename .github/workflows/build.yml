name: Build AxionOS Android 16 for Samsung A04

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تفريغ أقصى مساحة تخزين ممكنة داخل خادم GitHub (حذف الحزم الكبيرة)
      - name: Free Maximum Disk Space
        run: |
          echo "=== المساحة قبل التنظيف ==="
          df -h
          
          # حذف الحزم والبرامج الافتراضية الثقيلة
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          
          # تنظيف حزم Apt وحاويات Docker
          sudo apt-get clean
          docker image prune -a -f -a
          
          echo "=== المساحة المتاحة بعد التنظيف ==="
          df -h

      # 2. تثبيت حزم وتدبيرات البناء الأساسية
      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32ncurses5-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc zip zlib1g-dev python3 python3-pip

      # 3. إعداد أداة Repo و Git
      - name: Configure Git & Install Repo Tool
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تهيئة سورس AxionOS
      - name: Initialize AxionOS Source
        run: |
          mkdir -p android
          cd android
          repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1

      # 5. تنزيل شجرة جهاز Samsung A04
      - name: Clone Device Tree
        run: |
          cd android
          git clone https://github.com/juanes10201/android_device_samsung_a04.git -b main device/samsung/a04

      # 6. مزامنة السورس (تنزيل الملفات)
      - name: Sync Repositories
        run: |
          cd android
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # 7. بدء عملية التجميع (Compiling)
      - name: Build ROM
        run: |
          cd android
          source build/envsetup.sh
          lunch axion_a04-userdebug || lunch lineage_a04-userdebug
          mka bacon -j$(nproc --all)

      # 8. رفع ملف ZIP النهائي عند النجاح
      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxionOS-Samsung-A04-Android16
          path: android/out/target/product/a04/*.zip
