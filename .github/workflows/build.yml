name: Android 16 Precision Sync & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # الخطوة 1: تثبيت التبعيات أولاً بينما مجلدات النظام تمتلك مساحة افتراضية كافية
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

    # الخطوة 2: تنظيف وتوسيع القرص بعد التثبيت لتهيئة شجرة الأندرويد
    - name: Maximize Build Disk Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    # الخطوة 3: بدء عملية المزامنة وهيكلة الملفات والبناء
    - name: Setup Repo Tool & Build Infinity-X
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        git config --global lfs.fetchexclude "*"
        
        mkdir -p android && cd android
        
        # المزامنة باستخدام فلاتر توفير المساحة الصارمة
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --partial-clone --clone-filter=blob:none -g default,-notdefault,-darwin,-pdk,-vts,-emulator,-x86,-x86_64
        repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --current-branch

        # جلب نظام بناء أندرويد 16 يدوياً وبشكل شجري كامل داخل مجلد build/make
        rm -rf build
        mkdir -p build
        git clone https://android.googlesource.com/platform/build -b android-16.0.0_r1 build/make --depth=1
        
        # إنشاء روابط رمزية (Symlinks) لملفات الإعداد
        ln -sf build/make/core build/core
        ln -sf build/make/envsetup.sh build/envsetup.sh
        ln -sf build/make/target build/target

        # جلب أشجار هاتف Samsung A04 والـ Vendor والـ Kernel
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

        # تأكيد بيئة الشجرة وتصدير متغيرات التوجيه
        touch Makefile
        export ANDROID_BUILD_TOP=$(pwd)
        export TOP=$(pwd)
        
        # تفعيل البيئة وتجميع الروم
        chmod +x build/envsetup.sh
        source build/envsetup.sh
        
        lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug

        mka bacon -j$(nproc --all)
