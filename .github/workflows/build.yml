name: Build Android ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space & Setup Swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift /var/lib/docker
          sudo apt-get clean
          
          sudo swapoff -a || true
          sudo rm -f /swapfile
          
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          df -h
          free -h

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev lz4 libncurses-dev libssl-dev libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source & Build
        run: |
          git config --global user.email "cloud-build@infinity.org"
          git config --global user.name "CloudBuilder"
          
          mkdir -p android && cd android

          # تهيئة السورس
          repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --no-repo-verify
          
          # مزامنة سريعة وآمنة
          repo sync -c -j$(nproc --all) --force-sync --force-checkout --no-clone-bundle --no-tags --current-branch --retry-fetches=10
          
          # حذف مجلد .repo لتوفير المساحة للبناء
          rm -rf .repo

          # جلب شجرة الجهاز والـ Vendor والـ Kernel
          git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
          git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
          git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

          # بدء التجميع
          source build/envsetup.sh
          lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug
          m bacon -j$(nproc --all)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-A04-Build
          path: android/out/target/product/a04/*.zip
