name: Build Infinity-X / LineageOS for A04

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع جيت هاب

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. جلب المستودع الحالي
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. تفريغ مساحة السيرفر تلقائياً (حذف الحزم الكبيرة غير المستخدمة)
    - name: Free Disk Space (Automatic)
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: false # نتركه false للحفاظ على أدوات الـ SDK الأساسية للنظام
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # 3. تنظيف إضافي وعميق للمساحة عبر الـ Terminal
    - name: Deep Clean Disk Space (Manual)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h # يعرض لك المساحة المتاحة بعد التنظيف في الـ Logs

    # 4. إعداد أداة الـ Repo وتحميل السورس بأقل مساحة ممكنة
    - name: Setup Repo Tool & Build Infinity-X
      run: |
        # إعداد مجلد الأدوات وتثبيت الـ Repo
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH

        # إعدادات Git المطلوبة
        git config --global user.name "Halk56855"
        git config --global user.email "halk@example.com"

        # إنشاء مجلد العمل والانتقال إليه
        mkdir -p android
        cd android

        # أمر الـ Init المخفف (يجلب آخر تحديث فقط بدون تاريخ التعديلات القديم)
        # ملاحظة: قم بتغيير رابط السورس (-u) واسم الفرع (-b) إذا كنت تستخدم روم آخر
        repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --depth=1 --git-lfs

        # أمر الـ Sync الذكي والموفر للمساحة
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --prune

        # وضع أوامر بناء الروم الخاصة بك هنا بعد الـ Sync (مثال):
        # source build/envsetup.sh
        # lunch lineage_a04-userdebug
        # mka bacon
