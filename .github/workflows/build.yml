name: Build Lightweight AxionOS Android 16 for Samsung A04

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تنظيف أقصى مساحة من القرص قبل التنزيل
      - name: Free Maximum Disk Space
        run: |
          echo "=== المساحة المتاحة قبل التنظيف ==="
          df -h
          
          # إزالة الحزم الافتراضية الثقيلة غير المستخدمة
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/powershell
          
          # تنظيف حزم النظام وحاويات Docker
          sudo apt-get clean
          docker image prune -a -f -a
          
          echo "=== المساحة المتاحة بعد التنظيف ==="
          df -h

      # 2. تثبيت الحزم والأدوات الأساسية
      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32ncurses5-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc zip zlib1g-dev python3 python3-pip

      # 3. إعداد أداة Repo و Git
      - name: Configure Git & Install Repo Tool
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تهيئة سورس AxionOS (Lightweight Init)
      - name: Initialize AxionOS Source
        run: |
          mkdir -p android
          cd android
          repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1

      # 5. إنشاء Manifest محلي واستبعاد المشاريع الثقيلة غير الضرورية
      - name: Apply Minimal Local Manifest
        run: |
          cd android
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/remove_bloat.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- إزالة اختبارات وتطبيقات السورس الضخمة -->
            <remove-project name="platform/cts" />
            <remove-project name="platform/sdk" />
            <remove-project name="platform/developers/samples" />
            <!-- إزالة تعريفات شريحة Qualcomm المرفقة مع السورس العام لأن A04 معالجه Mediatek -->
            <remove-project name="LineageOS/android_hardware_qcom_display" />
            <remove-project name="LineageOS/android_hardware_qcom_media" />
          </manifest>
          EOF

      # 6. تنزيل شجرة جهاز Samsung A04
      - name: Clone Device Tree
        run: |
          cd android
          git clone https://github.com/juanes10201/android_device_samsung_a04.git -b main device/samsung/a04 --depth=1

      # 7. المزامنة الخفيفة السريعة (Minimal Sync)
      - name: Minimal Repo Sync
        run: |
          cd android
          repo sync -c --no-clone-bundle --no-tags --current-branch --depth=1 -j$(nproc --all) --force-sync

      # 8. بدء عملية التجميع الخفيفة (System Image Only)
      - name: Build System Image
        run: |
          cd android
          source build/envsetup.sh
          lunch axion_a04-userdebug || lunch lineage_a04-userdebug
          mka systemimage -j$(nproc --all)

      # 9. ضغط صورة النظام وتقليل حجمها للمخرج النهائي
      - name: Compress Output
        run: |
          cd android/out/target/product/a04/
          if [ -f "system.img" ]; then
            zip -9 system_a04.zip system.img
          fi

      # 10. رفع ملف النظام الناتج
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxionOS-Samsung-A04-SystemImage
          path: android/out/target/product/a04/system_a04.zip
