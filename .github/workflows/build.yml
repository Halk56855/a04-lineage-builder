name: Android 16 Precision Sync & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. تثبيت أدوات البناء أولاً قبل تقليص مساحة قسم النظام الرئيسي
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3
        sudo apt-get clean

    # 2. توسيع مساحة القرص وتخصيصها بالكامل لمجلد /mnt
    - name: Maximize Build Disk Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        build-mount-path: '/mnt'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    # 3. المزامنة الذكية والتجميع داخل القرص الموسّع (/mnt)
    - name: Setup Repo Tool & Build Infinity-X
      run: |
        # إنشاء مسار العمل داخل القرص الموسع /mnt
        sudo mkdir -p /mnt/android /mnt/tmp
        sudo chown -R $USER:$USER /mnt/android /mnt/tmp
        export TMPDIR=/mnt/tmp
        
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        git config --global lfs.fetchexclude "*"
        
        cd /mnt/android
        
        # أ) تهيئة السورس مع استبعاد المشاريع غير المطلوبة
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --no-repo-verify --partial-clone --clone-filter=blob:none -g default,-device,-mips,-x86
        
        # ب) مزامنة الشجرة
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --current-branch

        # ج) تفريغ مجلد .repo فوراً لتوفير مساحة للبناء
        echo "=== Freeing space by removing .repo folder ==="
        rm -rf .repo
        df -h

        # د) جلب أشجار هاتف Samsung A04 والـ Vendor والـ Kernel
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

        # هـ) تهيئة البيئة وتجميع الروم
        touch Makefile
        export ANDROID_BUILD_TOP=$(pwd)
        export TOP=$(pwd)
        
        chmod +x build/envsetup.sh
        source build/envsetup.sh
        
        lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug

        mka bacon -j$(nproc --all)

    # 4. رفع ملف الروم الناتج
    - name: Upload ROM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Infinity-X-ROM-A04
        path: /mnt/android/out/target/product/a04/*.zip
        retention-days: 7
