name: Android 16 Smart Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Freeing Up Disk Space Dynamic
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/swift
        sudo apt-get clean
        df -h

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

    - name: Setup Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync and Build ROM
      run: |
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        
        # إنشاء المجلد في المساحة الفارغة المخصصة للعمل للوصول لأقصى سعة
        mkdir -p ${{ github.workspace }}/android && cd ${{ github.workspace }}/android
        
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --git-lfs --depth=1
        
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04
        git clone https://github.com/DaniHasReal/android_vendor_samsung_a04.git -b main vendor/samsung/a04
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04
        
        repo sync -c --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j$(nproc --all)
        
        source build/envsetup.sh
        lunch infinity_a04-userdebug
        mka bacon -j$(nproc --all)
