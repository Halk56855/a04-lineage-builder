- name: Setup Repo Tool & Build Infinity-X
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        
        mkdir -p android && cd android
        
        # 1. تهيئة ومزامنة السورس الأساسي لروم Infinity-X
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --git-lfs -g default,-notdefault,-darwin,-pdk,-arm,-mips,-x86
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch

        # 2. جلب نظام بناء أندرويد 16 بالكامل في مساره الشجري الطبيعي
        rm -rf build
        git clone https://android.googlesource.com/platform/build -b android-16.0.0_r1 build --depth=1

        # 3. جلب أشجار هاتف Samsung A04 والـ Vendor والـ Kernel
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

        # 4. إصلاح التوجيه الداخلي لسكريبتات أندرويد 16 (تصدير المتغيرات الحرجة)
        export ANDROID_BUILD_TOP=$(pwd)
        export TOP=$(pwd)
        
        # تفعيل بيئة البناء عبر السكريبت الأساسي المتواجد داخل المجلد الفرعي الجديد لجوجل
        source build/make/envsetup.sh
        
        # 5. اختيار هدف البناء وتجميع الروم
        lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug

        mka bacon -j$(nproc --all)
