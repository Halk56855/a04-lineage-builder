name: Build AxionOS Android 16 GSI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تنظيف أقصى مساحة ممكنة من السيرفر
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v5
        with:
          root-reserve-mb: 1024
          swap-size-mb: 1
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. تثبيت الحزم المتوافقة مع أندرويد 16
      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32ncurses5-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc zip zlib1g-dev python3 python3-pip

      # 3. إعداد أداة Repo و Git
      - name: Configure Git & Install Repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # 4. تهيئة سورس AxionOS للـ GSI فقط (توفير المساحة)
      - name: Initialize AxionOS Source
        run: |
          mkdir -p android
          cd android
          repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1

      # 5. المزامنة الخفيفة
      - name: Sync Repositories
        run: |
          cd android
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # 6. بدء بناء صورة الـ GSI لمعمارية ARM64
      - name: Build GSI Image
        run: |
          cd android
          source build/envsetup.sh
          # اختيار تكوين GSI القياسي لمعمارية ARM64
          lunch axion_arm64_bgN-userdebug || lunch treble_arm64_bgN-userdebug
          make systemimage -j$(nproc --all)

      # 7. ضغط الصورة المخرجة لسهولة التحميل
      - name: Compress System Image
        run: |
          cd android/out/target/product/generic_arm64
          xz -z -9 system.img

      # 8. رفع الملف النهائي
      - name: Upload GSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxionOS-Android16-ARM64-GSI
          path: android/out/target/product/generic_arm64/system.img.xz
