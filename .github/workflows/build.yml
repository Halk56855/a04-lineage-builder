name: Android 16 Precision Sync & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extreme Root Disk Cleaning
      run: |
        sudo systemctl stop docker || true
        sudo rm -rf /var/lib/docker /etc/docker
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /share/swift /opt/pipx /usr/local/.ghcup /opt/az /usr/local/share/chromium /usr/local/lib/node_modules
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

    - name: Setup Repo Tool & Run Smart Build
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        
        mkdir -p android && cd android
        
        # إلغاء الفلاتر التي تسببت بحذف مجلد البناء الأساسي (build/)
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --git-lfs

        # إزالة الحزم الضخمة غير الضرورية من المانيفست للحفاظ على المساحة
        if [ -f .repo/manifests/default.xml ]; then
          sed -i '/platform\/prebuilts\/clang\/host\/linux-x86/d' .repo/manifests/default.xml
          sed -i '/platform\/prebuilts\/gcc\/linux-x86/d' .repo/manifests/default.xml
        fi
        
        # المزامنة الكاملة والمستقرة
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch

        # جلب الـ clang يدوياً بعمق 1
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86 --depth=1
        
        # جلب أشجار ملفات السامسونج A04
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1
        
        # تفعيل البيئة بعد التأكد من تحميل مجلد build/make/ بنجاح
        if [ -f "build/make/envsetup.sh" ]; then
          . build/make/envsetup.sh
        elif [ -f "build/envsetup.sh" ]; then
          . build/envsetup.sh
        else
          echo "بحث شامل عن السكربت في حال تغير مساره الافتراضي:"
          FOUND_SCRIPT=$(find . -name "envsetup.sh" | grep -v "cts" | head -n 1)
          . $FOUND_SCRIPT
        fi
        
        # بدء تجميع الروم
        lunch infinity_a04-userdebug
        mka bacon -j$(nproc --all)
