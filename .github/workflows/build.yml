name: Android 16 Precision Sync & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. تنظيف أولي للقرص
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost
        sudo docker image prune --all --force
        sudo apt-get clean

    # 2. تثبيت الحزم المطلوبة
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3
        sudo apt-get clean

    # 3. توسيع مساحة القرص
    - name: Maximize Build Disk Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 512
        build-mount-path: '/mnt'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    # 4. المزامنة والتجميع عبر سكريبت محمي
    - name: Setup Repo Tool & Build Infinity-X
      run: |
        sudo mkdir -p /mnt/android /mnt/tmp
        sudo chown -R $USER:$USER /mnt/android /mnt/tmp
        export TMPDIR=/mnt/tmp
        
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        git config --global lfs.fetchexclude "*"
        
        cd /mnt/android
        
        # أ) تهيئة السورس والمزامنة
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --no-repo-verify --partial-clone --clone-filter=blob:none -g default,-mips,-x86,-darwin,-notdefault
        repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --current-branch --retry-fetches=5

        # ب) تفريغ مجلد .repo لتوفير المساحة
        echo "=== Freeing space by removing .repo folder ==="
        rm -rf .repo
        df -h

        # ج) تنظيف المجلدات المستهدفة إن وجدت ثم جلب الأشجار
        rm -rf device/samsung/a04 vendor/samsung/a04 kernel/samsung/a04
        
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

        # د) التجميع داخل بيئة منفصلة لمنع الخروج المبكر
        bash -c '
          set -x
          export ANDROID_BUILD_TOP=$(pwd)
          export TOP=$(pwd)
          source build/envsetup.sh
          lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug
          mka bacon -j$(nproc --all)
        '

    # 5. رفع ملف الروم الناتج
    - name: Upload ROM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Infinity-X-ROM-A04
        path: /mnt/android/out/target/product/a04/*.zip
        retention-days: 7
