name: Android 16 Precision Sync & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Build Disk Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

    - name: Setup Repo Tool & Build Infinity-X
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        git config --global lfs.fetchexclude "*"
        
        mkdir -p android && cd android
        
        # 1. تهيئة السورس مع استبعاد المجموعات غير الضرورية للهاتف (المحاكيات، داروين، x86) لتوفير عشرات الجيجابايتات
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --partial-clone --clone-filter=blob:none -g default,-notdefault,-darwin,-pdk,-vts,-emulator,-x86,-x86_64
        
        # 2. المزامنة بأقل استهلاك تخزيني ممكن ومتابعة صارمة للأخطاء
        repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --current-branch

        # 3. جلب أشجار هاتف Samsung A04 والـ Vendor والـ Kernel
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
        git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1

        # 4. تهيئة ملفات التوجيه وتأكيد بيئة الشجرة
        touch Makefile
        export ANDROID_BUILD_TOP=$(pwd)
        export TOP=$(pwd)
        
        # 5. تفعيل البيئة من السورس
        source build/envsetup.sh
        
        # 6. اختيار هدف البناء وتجميع الروم
        lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug

        mka bacon -j$(nproc --all)
