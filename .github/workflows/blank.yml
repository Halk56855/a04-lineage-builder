name: Evolution X Cloud Builder for Samsung A04

on:
  workflow_dispatch: # تشغيل يدوّي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (تفريغ مساحة السيرفر الكبيرة)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: Install Build Dependencies (تثبيت أدوات البناء المحدثة)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk

    - name: Install Google Repo Tool (تثبيت أداة ريبو)
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"

    - name: Initialize Evolution X Source (تهيئة كود ايفولوشن إكس لفرع cnb)
      run: |
        export PATH="$HOME/bin:$PATH"
        git config --global user.email "cloud-build@evolution.org"
        git config --global user.name "CloudBuilder"
        mkdir android && cd android
        # تهيئة كاملة ومبسطة للمستودع لضمان جلب كافة الفروع والأدوات الرئيسية
        repo init -u https://github.com/Evolution-X/manifest.git -b cnb --git-lfs --depth=1
        
    - name: Clone Samsung A04 Device Tree (سحب الملفات المتوافقة كلياً لجهازك)
      run: |
        cd android
        # 1. شجرة الجهاز لـ DaniHasReal (فرع lineage_22)
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04
        # 2. شجرة الـ Vendor المطابقة لـ DaniHasReal (فرع main)
        git clone https://github.com/DaniHasReal/android_vendor_samsung_a04.git -b main vendor/samsung/a04
        # 3. مستودع الكيرنل المشترك لـ DaniTheSillyFem (فرع linux-4.19.y)
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04

    - name: Sync Source Code (بدء المزامنة السحابية للروم)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        # مزامنة سحابية كاملة وعميقة لضمان تحميل مجلد build الرئيسي
        repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc --all)

    - name: Locate and Verify envsetup.sh (البحث الذكي عن ملف الإعداد وتأكيده)
      id: locate_file
      run: |
        cd android
        echo "=== البحث عن ملف envsetup.sh في جميع المجلدات ==="
        FOUND_PATH=$(find . -name "envsetup.sh" | head -n 1)
        if [ -n "$FOUND_PATH" ]; then
          # إزالة النقطة الزائدة من بداية المسار للحصول على مسار نظيف
          CLEAN_PATH=$(echo "$FOUND_PATH" | sed 's|^\./||')
          echo "✅ تم العثور على الملف في المسار التالي: $CLEAN_PATH"
          echo "envsetup_path=$CLEAN_PATH" >> $GITHUB_ENV
        else
          echo "❌ خطأ فادح: لم يتم العثور على ملف envsetup.sh في أي مكان!"
          ls -R
          exit 1
        fi

    - name: Build Evolution X ROM (بدء التجميع التلقائي بناءً على المسار المكتشف)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        # استخراج المجلد الأب لملف envsetup.sh والدخول إليه لبدء التجميع
        TARGET_DIR=$(dirname "${{ env.envsetup_path }}")
        cd $TARGET_DIR
        source envsetup.sh
        lunch evo_a04-userdebug
        mka bacon -j$(nproc --all)

    - name: Upload Flashable ROM (رفع ملف الروم النهائي)
      uses: actions/upload-artifact@v4
      with:
        name: EvolutionX-CNB-Samsung-A04
        path: android/out/target/product/a04/*.zip
