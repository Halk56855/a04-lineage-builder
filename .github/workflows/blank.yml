name: LineageOS 23 Cloud Builder for Samsung A04

on:
  workflow_dispatch: # تشغيل يدوّي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (تفريغ مساحة السيرفر الكبيرة)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: Install Build Dependencies (تثبيت أدوات البناء المحدثة)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk

    - name: Install Google Repo Tool (تثبيت أداة ريبو)
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"

    - name: Initialize LineageOS 23 Source (تهيئة كود أندرويد 16 السريع)
      run: |
        export PATH="$HOME/bin:$PATH"
        git config --global user.email "cloud-build@lineage.org"
        git config --global user.name "CloudBuilder"
        mkdir android && cd android
        # تهيئة كود LineageOS 23 بأقل عمق لتوفير مساحة السيرفر
        repo init -u https://github.com/LineageOS/android.git -b lineage-23.0 --git-lfs --depth=1 --groups=all,-notdefault,-darwin,-pdk,-arm64-ndk,-mips,-x86
        
    - name: Clone Samsung A04 Device Tree (سحب شجرة الجهاز والـ Vendor والكيرنل المحدثة)
      run: |
        cd android
        # 1. شجرة الجهاز (فرع main)
        git clone https://github.com/juanes10201/android_device_samsung_a04.git -b main device/samsung/a04
        # 2. الـ Vendor الأصح والجديد (فرع main)
        git clone https://github.com/DaniHasReal/android_vendor_samsung_a04.git -b main vendor/samsung/a04
        # 3. مستودع الكيرنل الأحدث (فرع latest-B)
        git clone https://github.com/rsuntk-oss/android_kernel_samsung_a04m.git -b latest-B kernel/samsung/a04

    - name: Sync Source Code (بدء المزامنة السحابية لنسخة 23)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        repo sync -c -j8 --force-sync --no-clone-bundle --no-tags

    - name: Build LineageOS ROM (بدء التجميع البرمجي)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        source build/envsetup.sh
        lunch lineage_a04-userdebug
        mka bacon -j$(nproc --all)

    - name: Upload Flashable ROM (رفع ملف الروم النهائي)
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-23-Samsung-A04
        path: android/out/target/product/a04/*.zip
