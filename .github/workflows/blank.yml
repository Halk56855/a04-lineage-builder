name: Project Infinity X Android 16 Cloud Builder for Samsung A04

on:
  workflow_dispatch: # تشغيل يدوّي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Free Disk Space (تطهير المساحة وإصلاح المستودعات)
      run: |
        # تنظيف الملفات الضخمة
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift /etc/mono
        sudo docker image prune --all --force
        
        # إعادة توليد مستودعات Ubuntu الرسمية لضمان العثور على الحزم
        sudo UBUNTU_CODENAME=$(lsb_release -cs) && sudo tee /etc/apt/sources.list <<EOF
        deb http://azure.archive.ubuntu.com/ubuntu/ \$UBUNTU_CODENAME main restricted universe multiverse
        deb http://azure.archive.ubuntu.com/ubuntu/ \$UBUNTU_CODENAME-updates main restricted universe multiverse
        deb http://azure.archive.ubuntu.com/ubuntu/ \$UBUNTU_CODENAME-backports main restricted universe multiverse
        deb http://security.ubuntu.com/ubuntu/ \$UBUNTU_CODENAME-security main restricted universe multiverse
        EOF
        
        sudo apt-get clean
        df -h

    - name: Install Build Dependencies (تثبيت الحزم بعد إصلاح المستودعات)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3

    - name: Install Google Repo Tool (تثبيت أداة ريبو)
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"

    - name: Initialize Project Infinity X Source (تهيئة كود الروم لفرع أندرويد 16)
      run: |
        export PATH="$HOME/bin:$PATH"
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        mkdir android && cd android
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --git-lfs --depth=1

    - name: Clone Samsung A04 Device Tree (سحب ملفات جهازك)
      run: |
        cd android
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04
        git clone https://github.com/DaniHasReal/android_vendor_samsung_a04.git -b main vendor/samsung/a04
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04

    - name: Sync Source Code (بدء المزامنة السحابية الذكية)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        repo sync -c --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j$(nproc --all)

    - name: Locate and Verify envsetup.sh (البحث الديناميكي لضمان المسار)
      id: locate_file
      run: |
        cd android
        FOUND_PATH=$(find . -name "envsetup.sh" | head -n 1)
        if [ -n "$FOUND_PATH" ]; then
          CLEAN_PATH=$(echo "$FOUND_PATH" | sed 's|^\./||')
          echo "envsetup_path=$CLEAN_PATH" >> $GITHUB_ENV
        else
          echo "❌ خطأ فادح: لم يتم العثور على ملف envsetup.sh!"
          exit 1
        fi

    - name: Build Project Infinity X ROM (بدء التجميع التلقائي)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        TARGET_DIR=$(dirname "${{ env.envsetup_path }}")
        cd $TARGET_DIR
        source envsetup.sh
        lunch infinity_a04-userdebug
        mka bacon -j$(nproc --all)

    - name: Upload Flashable ROM (رفع ملف الروم النهائي)
      uses: actions/upload-artifact@v4
      with:
        name: Project-InfinityX-Android16-Samsung-A04
        path: android/out/target/product/a04/*.zip
