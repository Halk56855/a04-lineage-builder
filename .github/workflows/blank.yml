name: Project Infinity X Android 17 Cloud Builder for Samsung A04

on:
  workflow_dispatch: # تشغيل يدوّي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (تفريغ مساحة السيرفر الكبيرة)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force

    - name: Install Build Dependencies (تثبيت أدوات البناء المحدثة)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk

    - name: Install Google Repo Tool (تثبيت أداة ريبو)
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"

    - name: Initialize Project Infinity X Source (تهيئة كود الروم لفرع أندرويد 17)
      run: |
        export PATH="$HOME/bin:$PATH"
        git config --global user.email "cloud-build@infinity.org"
        git config --global user.name "CloudBuilder"
        mkdir android && cd android
        # توجيه المزامنة لفرع أندرويد 17 المخصص مع حزمة خفيفة لتجنب انهيار الاتصال
        repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 17 --git-lfs --depth=1 --groups=all,-notdefault,-darwin,-pdk,-arm64-ndk,-mips,-x86
        
    - name: Clone Samsung A04 Device Tree (سحب الملفات المتوافقة كلياً لجهازك)
      run: |
        cd android
        # سحب ملفات جهازك لضمان التوافقية (فرع lineage_22 كمصدر مرجعي مستقر للتعريفات)
        git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04
        git clone https://github.com/DaniHasReal/android_vendor_samsung_a04.git -b main vendor/samsung/a04
        git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04

    - name: Sync Source Code (بدء المزامنة السحابية للروم)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        repo sync -c --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune -j$(nproc --all)

    - name: Locate and Verify envsetup.sh (البحث الذكي والديناميكي عن ملف الإعداد)
      id: locate_file
      run: |
        cd android
        echo "=== جاري فحص المجلدات للوصول لملف الإعداد لأندرويد 17 ==="
        FOUND_PATH=$(find . -name "envsetup.sh" | head -n 1)
        if [ -n "$FOUND_PATH" ]; then
          CLEAN_PATH=$(echo "$FOUND_PATH" | sed 's|^\./||')
          echo "✅ تم العثور على ملف الإعداد بنجاح في: $CLEAN_PATH"
          echo "envsetup_path=$CLEAN_PATH" >> $GITHUB_ENV
        else
          echo "❌ خطأ: لم يتم العثور على ملف envsetup.sh في أي مجلد فرعي! تأكد من وجود هذا الفرع في مستودع الروم."
          ls -R
          exit 1
        fi

    - name: Build Project Infinity X ROM (بدء التجميع التلقائي بناءً على المسار المكتشف)
      run: |
        export PATH="$HOME/bin:$PATH"
        cd android
        TARGET_DIR=$(dirname "${{ env.envsetup_path }}")
        cd $TARGET_DIR
        source envsetup.sh
        lunch infinity_a04-userdebug
        mka bacon -j$(nproc --all)

    - name: Upload Flashable ROM (رفع ملف الروم النهائي)
      uses: actions/upload-artifact@v4
      with:
        name: Project-InfinityX-Android17-Samsung-A04
        path: android/out/target/product/a04/*.zip
