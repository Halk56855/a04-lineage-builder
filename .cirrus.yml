env:
  CIRRUS_WORKING_DIR: "/tmp/android"

task:
  name: "Build Android ROM"
  timeout_in: 120m
  container:
    image: ubuntu:24.04
    cpu: 8
    memory: 24G
    disk: 250G

  setup_env_script:
    - apt-get update -y
    - apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev lz4 libncurses-dev libssl-dev libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev openjdk-21-jdk python3 python-is-python3
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo
    - export PATH="$HOME/bin:$PATH"

  sync_and_build_script:
    - export PATH="$HOME/bin:$PATH"
    - git config --global user.email "cloud-build@infinity.org"
    - git config --global user.name "CloudBuilder"
    - repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --no-repo-verify
    - repo sync -c -j4 --force-sync --force-checkout --no-clone-bundle --no-tags --current-branch --retry-fetches=10
    - rm -rf .repo
    - git clone https://github.com/DaniHasReal/android_device_samsung_a04.git -b lineage_22 device/samsung/a04 --depth=1
    - git clone https://github.com/DaniHasReal/a04_vendor.git -b main vendor/samsung/a04 --depth=1
    - git clone https://github.com/DaniTheSillyFem/kernel_samsung_a04.git -b linux-4.19.y kernel/samsung/a04 --depth=1
    - source build/envsetup.sh
    - lunch infinity_a04-ap2a-userdebug || lunch infinity_a04-userdebug
    - m bacon -j$(nproc --all)
